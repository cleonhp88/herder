providers:
  echo_cli:
    type: cli
    executable: cat
    args: []
    input: stdin
    timeout: 30
    max_concurrency: 2
    parser: text
    # --- Capability manifest (optional, used by doctor and registry) ---
    # output_format: text       # One of: text, json, stream-json. Default: text.
    # supports: []              # Permission levels this provider can serve.
    #                           # Empty list (default) = unrestricted.
    #                           # Valid values: read_only, worktree_write, inplace_write, untrusted.
    # cost_hint: null           # Free-form cost label shown by doctor, e.g. "$0", "plan", "metered".
    # auth_env: null            # Name of the env var holding this provider's credential.
    #                           # None = on-disk or no auth required.
    #                           # When env_profile is also set, auth_env must appear in allow_env.

roles:
  planner:
    provider: echo_cli
    permissions: read_only
    output_format: report
    retry_policy: standard
  cheap:
    provider: echo_cli
    permissions: read_only
    output_format: report
    retry_policy: standard

projects:
  example_project:
    root: "/path/to/your/project"
    default_workspace_mode: readonly
    allowed_roles: [planner, cheap]
    allow_inplace: false

worker:
  global_concurrency: 3
  heartbeat_interval: 15
  lease_seconds: 3600
  timezone: "Asia/Ho_Chi_Minh"

doctor:
  min_ok_providers: 1

env_profiles:
  echo_cli:
    allow_env: []
